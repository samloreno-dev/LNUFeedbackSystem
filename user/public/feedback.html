<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            color: #1f2937;
            max-width: 480px;
            width: 90%;
        }
        h1 { margin-top: 0; color: #1b1464; }
        a {
            display: inline-block;
            margin-top: 1rem;
            padding: 12px 24px;
            background: #1b1464;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LNU Feedback System</h1>
        <p>Please use the feedback portal to submit your feedback.</p>
        <a href="/frontend_user/">Go to Feedback Portal</a>
    </div>
</body>
</html>
