# version removed (obsolete)

services:
  app:
    build: .
    container_name: adssbs-user-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://localhost:8082
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: adssbs
      DB_USERNAME: adssbs
      DB_PASSWORD: password
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./.env:/var/www/.env

    depends_on:
      - db
    networks:
      - adssbs-network


  nginx:
    image: nginx:alpine
    container_name: adssbs-user-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - adssbs-network

  db:
    image: mysql:8.0
    container_name: adssbs-user-db
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: adssbs
      MYSQL_USER: adssbs
      MYSQL_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - adssbs-network

networks:
  adssbs-network:
    driver: bridge

volumes:
  dbdata:

