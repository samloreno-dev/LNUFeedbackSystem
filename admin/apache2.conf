LoadModule rewrite_module modules/mod_rewrite.so

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/public
    <Directory /var/www/public>
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
</VirtualHost>

